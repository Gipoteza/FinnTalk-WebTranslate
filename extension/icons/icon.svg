<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#BBDEFB" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Фон -->
  <rect width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>
  <!-- Флаг Финляндии: горизонтальная синяя полоса -->
  <rect x="0" y="44" width="128" height="24" fill="#0D47A1" opacity="0.7"/>
  <!-- Вертикальная синяя полоса -->
  <rect x="36" y="0" width="24" height="128" fill="#0D47A1" opacity="0.7"/>
  <!-- Белый крест -->
  <rect x="0" y="48" width="128" height="16" fill="white" opacity="0.25"/>
  <rect x="40" y="0" width="16" height="128" fill="white" opacity="0.25"/>
  <!-- Речевой пузырь -->
  <ellipse cx="80" cy="80" rx="38" ry="28" fill="url(#bubble)"/>
  <polygon points="48,92 38,108 58,96" fill="url(#bubble)"/>
  <!-- Стрелка вправо -->
  <path d="M62,72 L88,72 L82,64 L96,80 L82,96 L88,88 L62,88 Z" fill="#1565C0"/>
  <!-- Стрелка влево (белая) -->
  <path d="M98,76 L72,76 L78,68 L64,84 L78,100 L72,92 L98,92 Z" fill="white" opacity="0.85"/>
</svg>
