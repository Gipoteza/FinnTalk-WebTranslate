<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройки Finnish Translator</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">Настройки Finnish Translator</h1>

    <div class="form-group">
      <label for="model">Модель ChatGPT</label>
      <select id="model">
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
      </select>
    </div>

    <div class="form-group">
      <label for="requests-per-minute">Лимит запросов в минуту</label>
      <input type="number" id="requests-per-minute" min="1" max="60" />
    </div>

    <div class="form-group form-group--inline">
      <input type="checkbox" id="quality-check" />
      <label for="quality-check">Проверка качества перевода</label>
    </div>

    <button id="btn-save" class="btn btn-primary">Сохранить</button>

    <div id="save-status" class="hidden">Настройки сохранены</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
